<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- %PUBLIC_URL% is a placeholder. react-scripts replaces it at build time
         with the real path to the public/ folder, so these links keep working
         both in dev (localhost:3000) and after `npm run build` -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- manifest.json = the "install as an app" info (name, icons, colors) -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>React App</title>
  </head>
  <body>
    <!-- so there is one thing and that is in
     packages.json there is one react-scripts
     what it does that it will secretly loads the index.js
     here in index.html

     NOTE: notice there is NO <script> tag in this file.
     react-scripts (webpack) bundles src/index.js into a file and injects
     the <script> tag for us when it serves/builds the page.
     compare this with the vite project, where we write the <script> by hand.
     -->

    <!-- shown only if the browser has JavaScript disabled. a React app is
         100% JS, so without JS the page would just be blank -->
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- THE ONLY THING REACT NEEDS: one empty box.
         everything you see on screen gets injected inside this div by React.
         index.js grabs it with document.getElementById('root') -->
    <div id="root"></div>

  </body>
</html>
